[tools]
bun = "latest"
npm = "latest"
pi = "latest"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["python"]

[settings.npm]
package_manager = "bun"

[tasks."ai:agent"]
description = "Run Pi agent in a sandbox"
usage = '''
arg "<dir>" help="Session working directory" default=""
'''
run = """
run_agent() {
  local uid
  local home
  local pwd
  uid="$1"
  home="$2"
  pwd="${3:-$MISE_ORIGINAL_CWD}"

  # Workaround for an issue with installing via mise
  mkdir -p "${home}/.bun/install/global"
  touch "${home}/.bun/install/global/package.json"

  /usr/local/bin/msb run --label toolbox -c4 -m16G -e HOME="$home" -v "${home}/.pi:${home}/.pi" -v "${home}/.gitignore_global:${home}/.gitignore_global" -v "${home}/.local/share/mise:${home}/.local/share/mise" -v "${home}/.local/state/mise:${home}/.local/state/mise" -v "${home}/.config/mise:${home}/.config/mise" -v "${home}/.cache/mise:${home}/.cache/mise" -v "${home}/.bun:${home}/.bun" -v "${pwd}:${pwd}" -w "$pwd" ghcr.io/throneless-tech/throneless-toolbox -- mise exec pi -- pi -c
}
run_agent "$(id -u)" "$HOME" "${usage_dir?}"
"""

[tasks."ai:workspace"]
description = "Run AI development tasks in Wezterm panes"
run = """
run_workspace() {
  local pane
  local command
  pane="$1"
  command="$2"

  echo "toolbox run --container dev ${command}" | wezterm cli send-text --no-paste --pane-id "$pane"
}

second_pane=$(wezterm cli split-pane --right)
third_pane=$(wezterm cli split-pane --bottom --pane-id "$second_pane")
run_workspace "$second_pane" "mise ai:agent $MISE_ORIGINAL_CWD"
run_workspace "$third_pane" "fish"
hx
"""

[tasks."ai:workspace-wide"]
description = "Run AI development tasks in Wezterm panes (Widescreen version)"
run = """
run_workspace() {
  local pane
  local command
  pane="$1"
  command="$2"

  echo "toolbox run --container dev ${command}" | wezterm cli send-text --no-paste --pane-id "$pane"
}

second_pane=$(wezterm cli split-pane --right --percent 67)
third_pane=$(wezterm cli split-pane --right --pane-id "$second_pane" --percent 50)
run_workspace "$second_pane" "hx"
run_workspace "$third_pane" "fish"
mise ai:agent $MISE_ORIGINAL_CWD
"""
